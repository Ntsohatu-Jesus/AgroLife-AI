<!DOCTYPE html>
<html>
<head>
    <title>AgroLife AI</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f5;
            margin: 0;
        }

        header {
            background: #2e7d32;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        #chat {
            height: 80vh;
            overflow-y: auto;
            padding: 10px;
        }

        .user-msg {
            text-align: right;
            background: #c8e6c9;
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
        }

        .bot-msg {
            text-align: left;
            background: #e0e0e0;
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
        }

        #inputArea {
            display: flex;
            padding: 10px;
            background: white;
        }

        input {
            flex: 1;
            padding: 10px;
        }

        button {
            background: green;
            color: white;
            border: none;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>AgroLife AI Assistant</header>

<div id="chat">
    <div class="bot-msg">
        Welcome to AgroLife AI.<br>
        Ask practical questions about farming, crops, or health.
    </div>
</div>

<div id="inputArea">
    <input id="userInput" placeholder="Ask a question..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script>
async function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value;

    if (!message) return;

    addMessage(message, "user");

    try {
        const response = await fetch(`http://127.0.0.1:8001/agent?query=${encodeURIComponent(message)}&session_id=test`);
        const data = await response.json();

        console.log("FULL API:", data);

        // 🔥 ALWAYS extract clean text
        let aiText = data.response;

        // If nested object (extra safety)
        if (typeof aiText === "object") {
            aiText = aiText.response || JSON.stringify(aiText);
        }

        addMessage(aiText, "bot");

    } catch (error) {
        addMessage("Server connection error. Please try again.", "bot");
        console.error(error);
    }

    input.value = "";
}

function addMessage(text, sender) {
    const chat = document.getElementById("chat");

    const msg = document.createElement("div");
    msg.className = sender === "user" ? "user-msg" : "bot-msg";
    msg.innerText = text;

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
